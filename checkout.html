<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إتمام الدفع - Home AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .checkout-container { padding: 40px 0; min-height: 80vh; }
        .checkout-grid { display: grid; grid-template-columns: 1fr 350px; gap: 30px; }
        .checkout-form { background: var(--bg-elevated); padding: 30px; border-radius: var(--radius-lg); border: 1px solid var(--border); }
        .order-summary { background: var(--surface); padding: 30px; border-radius: var(--radius-lg); border: 1px solid var(--border); height: fit-content; }
        .form-section { margin-bottom: 25px; }
        .form-section h3 { margin-bottom: 20px; color: var(--secondary); display: flex; align-items: center; gap: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: white; }
        .summary-item { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .total-price { font-size: 1.5rem; font-weight: 800; color: var(--secondary); margin-top: 20px; text-align: center; }
        
        /* Modal for Payment Gateway */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 3000; }
        .modal-content { background: var(--bg-elevated); padding: 40px; border-radius: 20px; text-align: center; max-width: 400px; border: 2px solid var(--primary); }
        .modal-content i { font-size: 4rem; color: var(--primary); margin-bottom: 20px; }
        
        @media (max-width: 768px) {
            .checkout-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="brand">
                <img src="logo.png" alt="Home AI Logo">
                <div class="brand-name">Home <span>AI</span></div>
            </div>
            <a href="index.html" class="tool-btn"><i class="fas fa-arrow-right"></i> العودة للمتجر</a>
        </div>
    </nav>

    <div class="container checkout-container">
        <h2 class="section-title">إتمام عملية الشراء</h2>
        
        <div class="checkout-grid">
            <div class="checkout-form">
                <form id="checkout-form">
                    <div class="form-section">
                        <h3><i class="fas fa-user"></i> المعلومات الشخصية</h3>
                        <div class="form-group">
                            <label>الاسم بالكامل</label>
                            <input type="text" id="order-name" placeholder="أدخل اسمك الكامل" required>
                        </div>
                        <div class="form-group">
                            <label>رقم الهاتف</label>
                            <input type="tel" id="order-phone" placeholder="01xxxxxxxxx" required>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3><i class="fas fa-map-marker-alt"></i> عنوان الاستلام</h3>
                        <div class="form-group">
                            <label>المحافظة / المدينة</label>
                            <input type="text" id="order-city" placeholder="مثال: القاهرة، التجمع الخامس" required>
                        </div>
                        <div class="form-group">
                            <label>العنوان بالتفصيل</label>
                            <textarea id="order-address" rows="3" placeholder="اسم الشارع، رقم العمارة، الشقة" required></textarea>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary" style="width: 100%; padding: 15px; font-size: 1.2rem;">تأكيد الطلب والانتقال للدفع</button>
                </form>
            </div>

            <div class="order-summary">
                <h3>ملخص الطلب</h3>
                <div id="order-items">
                    <!-- ستظهر العناصر هنا -->
                </div>
                <div class="total-price" id="order-total">الإجمالي: 0 ج.م</div>
            </div>
        </div>
    </div>

    <div class="modal" id="payment-modal">
        <div class="modal-content">
            <i class="fas fa-spinner fa-spin"></i>
            <h2>بوابة الدفع قيد التطوير</h2>
            <p>يرجى الانتظار، يتم العمل على تفعيل الدفع الإلكتروني حالياً.</p>
            <button class="btn-primary" onclick="window.location.href='index.html'" style="margin-top: 20px;">العودة للرئيسية</button>
        </div>
    </div>

    <script>
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        const orderItemsContainer = document.getElementById('order-items');
        const orderTotal = document.getElementById('order-total');
        let total = 0;

        if (cart.length === 0) {
            alert('سلتك فارغة!');
            window.location.href = 'index.html';
        }

        cart.forEach(item => {
            total += item.price * item.quantity;
            orderItemsContainer.innerHTML += `
                <div class="summary-item">
                    <span>${item.name} (x${item.quantity})</span>
                    <span>${item.price * item.quantity} ج.م</span>
                </div>
            `;
        });
        orderTotal.innerText = `الإجمالي: ${total} ج.م`;

        // تعبئة البيانات تلقائياً إذا كان مسجلاً للدخول
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (currentUser) {
            document.getElementById('order-name').value = currentUser.fullName;
            document.getElementById('order-phone').value = currentUser.phone;
        }

        document.getElementById('checkout-form').addEventListener('submit', (e) => {
            e.preventDefault();
            // هنا يمكن حفظ الطلب في localStorage أو إرساله لسيرفر
            document.getElementById('payment-modal').style.display = 'flex';
            // مسح السلة بعد الطلب
            localStorage.removeItem('cart');
        });
    </script>
</body>
</html>
