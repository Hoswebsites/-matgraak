        <div class="filter-group">

      <!-- RESULTS -->

          <div style="display:flex; align-items:center; gap:14px;">
            <span id="results-count" style="font-size:.85rem; color:var(--text-faint);"></span>

              <option value="new" data-i18n="sort_new"></option>
              <option value="low" data-i18n="sort_low"></option>
              <option value="high" data-i18n="sort_high"></option>
            </select>
          </div>
        </div>
        <div class="product-grid" id="shop-grid"></div>
        <div id="empty-msg" style="display:none; text-align:center; padding:60px 0; color:var(--text-faint);" data-i18n="empty_shop"></div>

<script src="main.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const initialCat = params.get('cat') || 'all';

  function currentFilters(){
    return {
      cat: document.querySelector('input[name="cat"]:checked').value,
      maxPrice: Number(document.getElementById('price-range').value),
      minRating: Number(document.querySelector('input[name="rating"]:checked').value),
      search: document.getElementById('search-input').value.trim().toLowerCase(),
      sort: document.getElementById('sort-select').value
    };
  }

  function renderShop(){
    const f = currentFilters();
    let list = PRODUCTS.filter(p=>{
      if(f.cat!=='all' && p.cat!==f.cat) return false;
      if(p.price > f.maxPrice) return false;
      if(p.rating < f.minRating) return false;
      if(f.search){
        const name = (getProductName(p)).toLowerCase();
        if(!name.includes(f.search)) return false;
      }
      return true;
    });
    if(f.sort==='low') list.sort((a,b)=>a.price-b.price);
    else if(f.sort==='high') list.sort((a,b)=>b.price-a.price);
    else if(f.sort==='new') list.sort((a,b)=>b.id-a.id);
    else list.sort((a,b)=>b.rating-a.rating);

    document.getElementById('shop-grid').innerHTML = list.map(renderProductCard).join('');
    document.getElementById('empty-msg').style.display = list.length? 'none':'block';
    document.getElementById('results-count').textContent = `${list.length} ${t('results_count')}`;
  }
  document.getElementById('shop-results').__rerender = renderShop;

  if(initialCat!=='all'){
    const radio = document.querySelector(`input[name="cat"][value="${initialCat}"]`);
    if(radio) radio.checked = true;
  }

  document.querySelectorAll('input[name="cat"], input[name="rating"]').forEach(el=> el.addEventListener('change', renderShop));
  document.getElementById('price-range').addEventListener('input', e=>{
    document.getElementById('price-range-val').textContent = `${e.target.value} EGP`;
    renderShop();
  });
  document.getElementById('search-input').addEventListener('input', renderShop);
  document.getElementById('sort-select').addEventListener('change', renderShop);
  document.getElementById('clear-filters').addEventListener('click', ()=>{
    document.querySelector('input[name="cat"][value="all"]').checked = true;
    document.querySelector('input[name="rating"][value="0"]').checked = true;
    document.getElementById('price-range').value = 7000;
    document.getElementById('price-range-val').textContent = '7000 EGP';
    document.getElementById('search-input').value = '';
    renderShop();
  });

  renderShop();
  window.addEventListener('langchange', renderShop);
</script>
