<section class="section-tight" id="product-section">
  <div class="container">
    <div class="breadcrumb">
      <a href="index.html" data-i18n="breadcrumb_home"></a> / <a href="shop.html" data-i18n="shop_title"></a> / <span id="crumb-name"></span>

    <div class="pd-layout">
      <div>
        <div class="pd-gallery-main" id="pd-main-thumb"></div>
        <div class="pd-thumbs" id="pd-thumbs"></div>
      </div>
      <div class="pd-info">
        <span class="product-cat" id="pd-cat"></span>
        <h1 id="pd-title" style="font-size:1.9rem; margin:8px 0;"></h1>
        <div class="product-rating" id="pd-rating"></div>
        <div class="pd-price-row">

        <div class="qty-row">

          <div><span data-i18n="pd_category"></span><span id="pd-cat2"></span></div>

    <div class="tabs">

<script src="main.js"></script>
<script>
  const pid = Number(new URLSearchParams(location.search).get('id')) || PRODUCTS[0].id;
  const product = PRODUCTS.find(p=>p.id===pid) || PRODUCTS[0];
  let qty = 1;

  function badgeText(){ return product.badge ? badgeLabel(product.badge) : ''; }

  function renderProduct(){
    document.title = `JS Store — ${getProductName(product)}`;
    document.getElementById('crumb-name').textContent = getProductName(product);
    document.getElementById('pd-main-thumb').style.background = thumbGradient(product.hue);
    document.getElementById('pd-main-thumb').innerHTML = iconSvg(product.icon) + (product.badge ? `<span class="product-badge">${badgeText()}</span>` : '');
    document.getElementById('pd-thumbs').innerHTML = [product,...PRODUCTS.filter(p=>p.cat===product.cat && p.id!==product.id).slice(0,3)]
      .map((p,i)=>`<div class="th ${i===0?'active':''}" style="background:${thumbGradient(p.hue)}" data-id="${p.id}">${iconSvg(p.icon)}</div>`).join('');
    document.getElementById('pd-cat').textContent = getCatLabel(product.cat);
    document.getElementById('pd-cat2').textContent = getCatLabel(product.cat);
    document.getElementById('pd-title').textContent = getProductName(product);
    document.getElementById('pd-rating').innerHTML = `<svg viewBox="0 0 24 24"><path d="M12 2l3.1 6.3 6.9 1-5 4.9 1.2 6.8L12 17.8 5.8 21l1.2-6.8-5-4.9 6.9-1L12 2Z"/></svg> ${product.rating} <span>(${product.reviews})</span>`;
    document.getElementById('pd-price').textContent = `${product.price} EGP`;
    document.getElementById('pd-old-price').textContent = product.old_price ? `${product.old_price} EGP` : '';
    document.getElementById('pd-desc').textContent = getProductDesc(product);
    document.getElementById('pd-sku').textContent = `JS-${String(product.id).padStart(4,'0')}`;
    document.getElementById('pd-avail').textContent = `${product.stock} ${getLang()==='ar'?'قطعة متبقية':'in stock'}`;
    document.getElementById('qty-val').textContent = qty;
    document.getElementById('pd-wish-btn').classList.toggle('active', getWishlist().includes(product.id));

    document.getElementById('tab-desc').innerHTML = `<p>${getProductDesc(product)}</p>`;
    const specsAr = `<div class="pd-meta"><div><span>الفئة</span><span>${getCatLabel(product.cat)}</span></div><div><span>التقييم</span><span>${product.rating} / 5</span></div><div><span>الكمية المتاحة</span><span>${product.stock}</span></div><div><span>الضمان</span><span>سنة واحدة</span></div></div>`;
    const specsEn = `<div class="pd-meta"><div><span>Category</span><span>${getCatLabel(product.cat)}</span></div><div><span>Rating</span><span>${product.rating} / 5</span></div><div><span>Stock</span><span>${product.stock}</span></div><div><span>Warranty</span><span>1 Year</span></div></div>`;
    document.getElementById('tab-specs').innerHTML = getLang()==='ar' ? specsAr : specsEn;
    document.getElementById('tab-reviews').innerHTML = `<p>${getLang()==='ar' ? `${product.reviews} تقييم بمتوسط ${product.rating} من 5 نجوم.` : `${product.reviews} reviews with an average rating of ${product.rating} out of 5.`}</p>`;

    document.querySelectorAll('.pd-thumbs .th').forEach(th=>{
      th.addEventListener('click', ()=>{
        const newId = Number(th.dataset.id);
        if(newId!==product.id) location.href = `product.html?id=${newId}`;
      });
    });
  }

  function renderRelated(){
    const related = PRODUCTS.filter(p=>p.cat===product.cat && p.id!==product.id).slice(0,4);
    document.getElementById('related-grid').innerHTML = related.map(renderProductCard).join('');
  }
  document.getElementById('related-grid').__rerender = renderRelated;

  document.getElementById('qty-minus').addEventListener('click', ()=>{ qty = Math.max(1, qty-1); document.getElementById('qty-val').textContent = qty; });
  document.getElementById('qty-plus').addEventListener('click', ()=>{ qty = Math.min(product.stock, qty+1); document.getElementById('qty-val').textContent = qty; });
  document.getElementById('pd-add-btn').addEventListener('click', ()=> addToCart(product.id, qty));
  document.getElementById('pd-wish-btn').addEventListener('click', ()=>{
    const active = toggleWishlist(product.id);
    document.getElementById('pd-wish-btn').classList.toggle('active', active);
  });

  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
    });
  });

  renderProduct();
  renderRelated();
  window.addEventListener('langchange', ()=>{ renderProduct(); renderRelated(); });
</script>
</body>
