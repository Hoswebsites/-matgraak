<script src="i18n.js"></script>

<script src="main.js"></script>
<script>
  let discount = 0;

  function renderCart(){
    const cart = getCart();
    const filledEl = document.getElementById('cart-filled');
    const emptyEl = document.getElementById('cart-empty');
    if(cart.length===0){
      filledEl.style.display = 'none';
      emptyEl.style.display = 'block';
      return;
    }
    filledEl.style.display = 'block';
    emptyEl.style.display = 'none';

    let subtotal = 0;
    const rows = cart.map(item=>{
      const p = PRODUCTS.find(pp=>pp.id===item.id);
      if(!p) return '';
      const lineTotal = p.price * item.qty;
      subtotal += lineTotal;
      return `
      <tr data-id="${p.id}">
        <td>
          <div class="cart-item-info">
            <div class="cart-thumb" style="background:${thumbGradient(p.hue)}">${iconSvg(p.icon)}</div>
            <div>
              <a href="product.html?id=${p.id}"><strong>${getProductName(p)}</strong></a><br>
              <button class="remove-btn" onclick="removeFromCart(${p.id}); renderCart();" data-i18n="th_action">${t('th_action')}</button>
            </div>
          </div>
        </td>
        <td>${p.price} EGP</td>
        <td>
          <div class="qty-box">
            <button onclick="updateCartQty(${p.id}, ${item.qty-1}); renderCart();">−</button>
            <span>${item.qty}</span>
            <button onclick="updateCartQty(${p.id}, ${item.qty+1}); renderCart();">+</button>
          </div>
        </td>
        <td><strong>${lineTotal} EGP</strong></td>
        <td><button class="tool-btn" onclick="removeFromCart(${p.id}); renderCart();" aria-label="remove"><svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" fill="none"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13"/></svg></button></td>
      </tr>`;
    }).join('');
    document.getElementById('cart-body').innerHTML = rows;

    const total = Math.max(0, subtotal - discount);
    document.getElementById('sum-sub').textContent = `${subtotal} EGP`;
    document.getElementById('sum-total').textContent = `${total} EGP`;
    if(discount>0){
      document.getElementById('discount-row').style.display = 'flex';
      document.getElementById('sum-discount').textContent = `-${discount} EGP`;
    } else {
      document.getElementById('discount-row').style.display = 'none';
    }
  }

  document.getElementById('coupon-btn').addEventListener('click', ()=>{
    const code = document.getElementById('coupon-input').value.trim().toUpperCase();
    const subtotal = getCart().reduce((s,i)=>{ const p = PRODUCTS.find(pp=>pp.id===i.id); return s + (p?p.price*i.qty:0); },0);
    if(code === 'JS10'){
      discount = Math.round(subtotal * 0.10);
      showToast(t('toast_coupon_ok'));
    } else {
      discount = 0;
      showToast(t('toast_coupon_bad'));
    }
    renderCart();
  });

  document.getElementById('checkout-btn').addEventListener('click', ()=>{
    if(getCart().length===0) return;
    showToast(getLang()==='ar' ? 'سيتم إضافة صفحة الدفع قريبًا' : 'Checkout page coming soon');
  });

  renderCart();
  window.addEventListener('langchange', renderCart);
</script>
